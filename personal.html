<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.H.I.E.L.D. | Private Asset Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: black; color: #66FF99; font-family: 'Courier New', monospace; overflow-x: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        #loginBox {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 40px 60px; border: 2px solid #66FF99; background: rgba(0, 0, 0, 0.9);
            clip-path: polygon(0% 15%, 15% 0%, 85% 0%, 100% 15%, 100% 85%, 85% 100%, 15% 100%, 0% 85%);
            box-shadow: 0 0 20px #66FF99; text-align: center; z-index: 100;
        }

        input { 
            display: block; margin: 10px auto; padding: 12px; width: 240px; 
            background: black; border: 1px solid #66FF99; color: #66FF99; outline: none;
        }
        button { 
            padding: 10px 30px; background: #001A0D; border: 1px solid #66FF99; 
            color: #66FF99; cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        button:hover { background: #66FF99; color: black; box-shadow: 0 0 15px #66FF99; }

        #program { display: none; padding: 40px; min-height: 100vh; background: rgba(0, 0, 0, 0.9); }
        .glass { background: rgba(102, 255, 153, 0.05); border: 1px solid rgba(102, 255, 153, 0.2); backdrop-filter: blur(5px); }
        
        .gallery-img { 
            border: 1px solid #66FF99; transition: 0.3s; cursor: pointer;
            filter: grayscale(100%) brightness(0.6);
        }
        .gallery-img:hover { filter: grayscale(0%) brightness(1); transform: scale(1.02); }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div id="loginBox">
        <h1 class="text-xl font-bold tracking-[4px] mb-6">S.H.I.E.L.D. ACCESS</h1>
        <input id="user" placeholder="AGENT ID">
        <input id="pass" type="password" placeholder="PASSWORD">
        <button onclick="checkAdmin()">AUTHENTICATE</button>
        <p id="error" class="text-red-500 mt-4 text-xs h-4"></p>
    </div>

    <div id="program">
        <div class="max-w-6xl mx-auto">
            <header class="flex justify-between items-center border-b border-[#66FF99] pb-4 mb-8">
                <div>
                    <h2 class="text-xl font-bold">SECURE_VAULT.exe</h2>
                    <p class="text-[10px] opacity-60">ENCRYPTED_CONNECTION_ESTABLISHED</p>
                </div>
                <button onclick="location.reload()" class="text-[10px] border border-[#66FF99] px-2">TERMINATE_SESSION</button>
            </header>

            <div class="glass p-6 rounded mb-8 flex flex-col md:flex-row gap-4 items-center">
                <input type="file" id="fileItem" class="block w-full text-sm text-[#66FF99] file:mr-4 file:py-2 file:px-4 file:border-0 file:bg-[#66FF99] file:text-black hover:file:opacity-80 cursor-pointer"/>
                <button id="uploadBtn" onclick="uploadFile()" class="w-full md:w-auto bg-[#66FF99] text-black font-bold px-8 h-10">UPLOAD_ASSET</button>
            </div>

            <div id="gallery" class="grid grid-cols-2 md:grid-cols-4 gap-6">
                </div>
        </div>
    </div>

    <script>
        // --- SUPABASE CONFIG ---
        const SUPABASE_URL = 'https://xlkluoxkjoltktqgbwzi.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Kj75cprjHDFhzGBHAfG0uw_RBlkFnqD';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- MATRIX BACKGROUND ---
        const canvas = document.getElementById("matrix");
        const ctx = canvas.getContext("2d");
        canvas.height = window.innerHeight; canvas.width = window.innerWidth;
        const letters = "01"; const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#66FF99"; ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                let text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 35);

        // --- LOGIN LOGIC ---
        window.checkAdmin = () => {
            const u = document.getElementById("user").value;
            const p = document.getElementById("pass").value;
            // Using your requested credentials
            if (u === "aratrik" && p === "2009") {
                document.getElementById("loginBox").style.display = "none";
                document.getElementById("program").style.display = "block";
                loadImages();
            } else {
                document.getElementById("error").innerText = "ACCESS DENIED: INTRUSION DETECTED";
            }
        };

        // --- STORAGE LOGIC ---
        async function uploadFile() {
            const fileItem = document.getElementById('fileItem');
            const file = fileItem.files[0];
            const btn = document.getElementById('uploadBtn');
            if (!file) return;

            btn.innerText = "UPLOADING...";
            const fileName = `${Date.now()}_${file.name}`;
            const { error } = await _supabase.storage.from('vault').upload(fileName, file);

            if (error) {
                alert("SYSTEM ERROR: " + error.message);
            } else {
                fileItem.value = ""; // Clear input
                loadImages();
            }
            btn.innerText = "UPLOAD_ASSET";
        }

        async function loadImages() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '<p class="col-span-full opacity-50">SCANNING_REMOTE_SERVER...</p>';
            
            const { data, error } = await _supabase.storage.from('vault').list();

            if (data) {
                gallery.innerHTML = '';
                data.forEach(file => {
                    if (file.name === ".emptyFolderPlaceholder") return;
                    const { data: urlData } = _supabase.storage.from('vault').getPublicUrl(file.name);
                    
                    const imgDiv = document.createElement('div');
                    imgDiv.className = "glass p-2 relative overflow-hidden group";
                    imgDiv.innerHTML = `
                        <img src="${urlData.publicUrl}" class="gallery-img w-full h-48 object-cover rounded">
                        <div class="mt-2 text-[10px] truncate opacity-50 text-center uppercase">${file.name.split('_').pop()}</div>
                    `;
                    gallery.appendChild(imgDiv);
                });
            } else {
                gallery.innerHTML = '<p class="text-red-500">ERROR: UNABLE TO REACH VAULT</p>';
            }
        }
    </script>
</body>
</html>
