<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.H.I.E.L.D. | Private Asset Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: black; color: #66FF99; font-family: 'Courier New', monospace; overflow-x: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        #loginBox {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 40px 60px; border: 2px solid #66FF99; background: rgba(0, 0, 0, 0.9);
            clip-path: polygon(0% 15%, 15% 0%, 85% 0%, 100% 15%, 100% 85%, 85% 100%, 15% 100%, 0% 85%);
            box-shadow: 0 0 20px #66FF99; text-align: center; z-index: 100;
        }
        input { display: block; margin: 10px auto; padding: 12px; width: 240px; background: black; border: 1px solid #66FF99; color: #66FF99; outline: none; }
        button { padding: 10px 30px; background: #001A0D; border: 1px solid #66FF99; color: #66FF99; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        button:hover { background: #66FF99; color: black; box-shadow: 0 0 15px #66FF99; }
        #program { display: none; padding: 40px; min-height: 100vh; background: rgba(0, 0, 0, 0.9); }
        .glass { background: rgba(102, 255, 153, 0.05); border: 1px solid rgba(102, 255, 153, 0.2); backdrop-filter: blur(5px); }
        .gallery-img { border: 1px solid #66FF99; transition: 0.3s; cursor: pointer; filter: grayscale(100%) brightness(0.7); }
        .gallery-img:hover { filter: grayscale(0%) brightness(1); transform: scale(1.02); }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div id="loginBox">
        <h1 class="text-xl font-bold tracking-[4px] mb-6">S.H.I.E.L.D. ACCESS</h1>
        <input id="user" placeholder="AGENT ID">
        <input id="pass" type="password" placeholder="PASSWORD">
        <button onclick="checkAdmin()">AUTHENTICATE</button>
        <p id="error" class="text-red-500 mt-4 text-xs h-4"></p>
    </div>

    <div id="program">
        <div class="max-w-6xl mx-auto">
            <header class="flex justify-between items-center border-b border-[#66FF99] pb-4 mb-8">
                <div>
                    <h2 class="text-xl font-bold">SECURE_VAULT.exe</h2>
                    <p class="text-[10px] opacity-60 uppercase">Node: xlkluoxkjoltktqgbwzi</p>
                </div>
                <button onclick="location.reload()" class="text-[10px] border border-[#66FF99] px-2">TERMINATE_SESSION</button>
            </header>

            <div class="glass p-6 rounded mb-8 flex flex-col md:flex-row gap-4 items-center">
                <input type="file" id="fileItem" class="block w-full text-sm text-[#66FF99] file:mr-4 file:py-2 file:px-4 file:border-0 file:bg-[#66FF99] file:text-black cursor-pointer"/>
                <button id="uploadBtn" onclick="uploadFile()" class="w-full md:w-auto bg-[#66FF99] text-black font-bold px-8 h-10">UPLOAD_ASSET</button>
            </div>

            <div id="gallery" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
        </div>
    </div>

    <div id="imageModal" class="fixed inset-0 z-[200] hidden flex items-center justify-center bg-black/95 backdrop-blur-md p-4">
        <div class="relative max-w-5xl w-full flex flex-col items-center">
            <button onclick="closeModal()" class="absolute -top-12 right-0 text-[#66FF99] text-4xl">&times;</button>
            <img id="modalImg" src="" class="max-h-[75vh] border border-[#66FF99] shadow-[0_0_30px_#66FF99] object-contain">
            
            <div class="mt-6 flex flex-col items-center gap-4">
                <p id="modalTitle" class="text-[#66FF99] tracking-widest uppercase text-sm font-bold"></p>
                <button id="deleteBtn" class="bg-red-900/20 border border-red-500 text-red-500 px-6 py-2 hover:bg-red-500 hover:text-white transition-all text-xs">
                    DELETE_PERMANENTLY
                </button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xlkluoxkjoltktqgbwzi.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Kj75cprjHDFhzGBHAfG0uw_RBlkFnqD';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Matrix Effect
        const canvas = document.getElementById("matrix");
        const ctx = canvas.getContext("2d");
        canvas.height = window.innerHeight; canvas.width = window.innerWidth;
        const drops = Array(Math.floor(canvas.width/14)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#66FF99"; ctx.font = "14px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*2), i*14, y*14);
                if (y*14 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 35);

        // Auth Logic
        window.checkAdmin = () => {
            if (document.getElementById("user").value === "aratrik" && document.getElementById("pass").value === "2009") {
                document.getElementById("loginBox").style.display = "none";
                document.getElementById("program").style.display = "block";
                loadImages();
            } else { document.getElementById("error").innerText = "ACCESS_DENIED"; }
        };

        // Upload Logic
        async function uploadFile() {
            const file = document.getElementById('fileItem').files[0];
            if (!file) return;
            document.getElementById('uploadBtn').innerText = "UPLOADING...";
            await _supabase.storage.from('vault').upload(`${Date.now()}_${file.name}`, file);
            document.getElementById('uploadBtn').innerText = "UPLOAD_ASSET";
            loadImages();
        }

        // Load Gallery
        async function loadImages() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '<p class="col-span-full text-center opacity-50">SCANNING...</p>';
            const { data } = await _supabase.storage.from('vault').list();
            if (data) {
                gallery.innerHTML = '';
                data.forEach(file => {
                    if (file.name === ".emptyFolderPlaceholder") return;
                    const { data: urlData } = _supabase.storage.from('vault').getPublicUrl(file.name);
                    const div = document.createElement('div');
                    div.className = "glass p-2";
                    div.innerHTML = `<img src="${urlData.publicUrl}" onclick="openModal('${urlData.publicUrl}', '${file.name}')" class="gallery-img w-full h-40 object-cover">`;
                    gallery.appendChild(div);
                });
            }
        }

        // Modal & Delete Functions
        window.openModal = (url, fileName) => {
            document.getElementById('modalImg').src = url;
            document.getElementById('modalTitle').innerText = fileName;
            document.getElementById('imageModal').classList.remove('hidden');
            document.getElementById('deleteBtn').onclick = () => deleteFile(fileName);
        };

        window.closeModal = () => document.getElementById('imageModal').classList.add('hidden');

        async function deleteFile(fileName) {
            if (confirm("CONFIRM DELETION: THIS ACTION CANNOT BE UNDONE.")) {
                const { error } = await _supabase.storage.from('vault').remove([fileName]);
                if (error) alert("DELETE_FAILED");
                else {
                    closeModal();
                    loadImages();
                }
            }
        }
    </script>
</body>
</html>
